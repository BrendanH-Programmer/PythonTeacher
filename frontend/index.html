<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AI Python Tutor</title>
    <link rel="stylesheet" href="css/styles.css">
</head>

<body onload="initApp()">
<div class="container">

    <h1>AI Python Tutor</h1>

    <!-- ================= USER INFO ================= -->
    <div class="card">
        <p id="userInfo">Loading user...</p>
        <button onclick="logout()">Logout</button>
    </div>

    <!-- ================= LESSON SELECT ================= -->
    <div class="card">

        <h2>Lessons</h2>

        <select id="lessonSelect" onchange="startLesson()">
            <option value="1">Lesson 1 - Python Basics</option>
            <option value="2">Lesson 2 - Variables</option>
        </select>

    </div>

    <!-- ================= LESSON FLOW ================= -->
    <div class="card" id="lessonCard">

        <h2 id="lessonTitle">Select a lesson</h2>

        <div id="lessonContent"></div>

        <div class="row">
            <button onclick="prevSection()">Back</button>
            <button onclick="nextSection()">Next</button>
        </div>

    </div>

    <!-- ================= AI TUTOR ================= -->
    <div class="card hidden" id="tutorCard">

        <h2>AI Tutor</h2>

        <textarea id="codeInput" placeholder="Write your Python code here..."></textarea>

        <div class="row">
            <button onclick="sendCode()">Analyse Code</button>
            <button onclick="nextHint()">Next Hint</button>
        </div>

        <pre id="responseBox"></pre>

        <table>
            <thead>
                <tr>
                    <th>Type</th>
                    <th>Priority</th>
                    <th>Message</th>
                </tr>
            </thead>
            <tbody id="errorTable"></tbody>
        </table>

    </div>

</div>

<!-- scripts -->
<script src="js/auth.js"></script>
<script src="js/app.js"></script>
<script src="js/lesson_engine.js"></script>

<script>
async function initApp() {
    await checkLogin();
    await resumeSession();
}
</script>

</body>
</html>
